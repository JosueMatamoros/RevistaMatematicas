\Css{
.autores-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 1em;
  text-align: center;
  margin-bottom: 1.5em;
}
.autor {
  flex: 1 1 220px;
  max-width: 280px;
  padding: 0.5em;
  box-sizing: border-box;
  line-height: 0.8; % /* Aplica a esta caja */
}
.autor * {
  line-height: 0.8 !important; %/*  Forzar en todo contenido interno */
  margin-top: 0.2em;
  margin-bottom: 0.2em;
}
}
