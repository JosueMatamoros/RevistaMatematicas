%% Botón Cejilla-----------------------------------------++++++++++++++++
\newcount\cejillaCounter
\cejillaCounter=0
% Definir el comando cejilla usando la misma técnica que hejersol
\long\def\cejilla#1#2{%
    \global\advance\cejillaCounter by 1
    \edef\cejillaId{cejilla-\number\cejillaCounter}%
    % Romper párrafos correctamente
    \ifvmode\IgnorePar\fi\EndP
    \HCode{<div class="cejilla-wrapper" style="margin: 1rem 0;">}%
    \HCode{<button class="cejilla-toggle" aria-expanded="false" aria-controls="\cejillaId">}%
    \HCode{<span class="cejilla-icon">▶</span>}%
    \HCode{#1}%
    \HCode{</button>}%
    \HCode{<div class="cejilla-content" id="\cejillaId" hidden="true">}%
    \ifvmode\IgnorePar\fi\EndP
    #2%
    \ifvmode\IgnorePar\fi\EndP
    \HCode{</div>}%
    \HCode{</div>}%
    \par\medskip
}%---------------------------------------------------+++++++++++++++
