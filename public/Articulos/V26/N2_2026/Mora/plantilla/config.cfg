% BOTON TUTOR
% \botonvertutor{Ejercicio 5.1}{texto/ejercicios/ejercicio5-1.html}
\newcommand{\botonvertutor}[2]{%
  \HCode{<button class="btn-tutor"
    onclick="window.open('#2','_blank')">&\#x1F4D6; Tutor: #1</button>}%
}
%% Abrir ventana Independiente con script
%% #1: URL
%% #2: 800px fijos
%% #3: 600 px fijos
%% #4: ancho popup (porcentaje)
%% #5: alto popup (porcentaje)
%% #6: título
%% #7: texto hint
%% Abrir ventana Independiente con script
\NewDocumentCommand{\VentanayAbrirVentanaIndependiente}{m m m m m m m}{%
  \HCode{<div class="iframe-container">}%
  \HCode{<iframe src="}%
  \detokenize{#1}%
  \HCode{" width="}#2\HCode{" height="}#3%
  \HCode{" frameborder="1"}%
  \HCode{ style="border:2px solid \#306898; display:block; margin-bottom:10px;"}%
  \HCode{ title="}#6\HCode{"></iframe>}%
  \HCode{<button class="btn-ventana" onclick="AbrirVentana('\detokenize{#1}','}#6\HCode{',}#4\HCode{,}#5\HCode{)">}%
  \HCode{<svg width="14" height="14" viewBox="0 0 16 16">}%
  \HCode{<rect x="1" y="4" width="10" height="10" rx="1.5" stroke-width="1.5"/>}%
  \HCode{<path d="M7 1H15V9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>}%
  \HCode{<path d="M9 7L15 1" stroke-width="1.5" stroke-linecap="round"/>}%
  \HCode{</svg>}%
  \HCode{Abrir en ventana independiente}%
  \HCode{</button>}%
  \HCode{<span class="iframe-hint">}#7\HCode{</span>}%
  \HCode{</div>}%
}%%%
