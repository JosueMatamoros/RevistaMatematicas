% Tablas para encabezado página
\newenvironment{efntabular}{%
  \bgroup%
  \Configure{tabular}
    {\HCode{<table class="efn-table">}}%
    {\HCode{</table>}}%
    {\HCode{<tr class="efn-row">}}%
    {\HCode{</tr>}}%
    {\HCode{<td class="efn-cell">}}%
    {\HCode{</td>}}%
}{%
  \egroup%
}
% Tablas con espaciado entre renglones pequeno (no filas, sino renglones).Para \webautores
\newenvironment{fntabular}{%
  \bgroup%
  \Configure{tabular}
    {\HCode{<table class="fn-table">}}%
    {\HCode{</table>}}%
    {\HCode{<tr class="fn-row">}}%
    {\HCode{</tr>}}%
    {\HCode{<td class="fn-cell">}}%
    {\HCode{</td>}}%
}{%
  \egroup%
}
\Css{
%  /* Estilo base para efntabular y fntabular */
  .efn-container, .fn-container {
    width: 100\%;
    overflow-x: auto;
  }
  .efn-table, .fn-table {
    width: 100\%;
    border-collapse: collapse;
    table-layout: fixed;
    word-wrap: break-word;
    max-width: 100\%;
    box-sizing: border-box;
  }
  .efn-table, .efn-table tr, .efn-table td,
  .fn-table, .fn-table tr, .fn-table td {
    border: 0;
    padding: 0;
    margin: 0;
  }
  .efn-table td, .fn-table td {
    line-height: 1.2;
    overflow-wrap: break-word;
    word-break: break-word;
  }
%  /* Imágenes dentro de tablas */
  .efn-table img, .fn-table img {
    max-width: 100\%;
    height: auto;
    vertical-align: middle;
  }
%  /* Estilo específico para alineaciones dentro de celdas anidadas de TBL-1 */
  table\#TBL-1 > tbody > tr > td:nth-child(1) .efn-table {
    text-align: left !important;
    margin-right: auto;
  }
  table\#TBL-1 > tbody > tr > td:nth-child(2) .efn-table {
    text-align: left !important;
    margin-left: 0;
  }
  table\#TBL-1 > tbody > tr > td:nth-child(3) .efn-table {
    text-align: right !important;
    margin-left: auto;
  }
}
% Gobierna la tabla inicial de la página
\Css{
 table\#TBL-1 {
  width: 100\%;
  table-layout: fixed;
  border-collapse: collapse;
}
table\#TBL-1 > tbody > tr > td:nth-child(1) {
  width: 10\%;
  vertical-align: middle;
  text-align: left;
}
table\#TBL-1 > tbody > tr > td:nth-child(2) {
  width: 65\%;
  text-align: left;
}
table\#TBL-1 > tbody > tr > td:nth-child(3) {
  width: 25\%;
  text-align: right;
}
table\#TBL-1 .efn-table {
  width: 100\%;
}
@media (max-width: 768px) {
  table\#TBL-1 {
    display: block;
    width: 100\% !important;
    table-layout: auto !important;
    margin: 0;
    padding: 0;
  }
  table\#TBL-1 tr {
    display: block;
    width: 100\%;
  }
  table\#TBL-1 td {
    display: block;
    width: 100\% !important;
    text-align: left !important;
    box-sizing: border-box;
  }
  table\#TBL-1 .efn-table {
    table-layout: auto;
    width: 100\% !important;
  }
}
}
%
\Css{
  \#fecha-tabla {
    width: 100\%;
    border-collapse: collapse;
  }
  \#fecha-tabla tr td {
    vertical-align: middle;
    padding: 0.2em 0.5em;
  }
  \#fecha-tabla tr td:nth-child(1) {
    width: 30\%;
    text-align: left;
  }
  \#fecha-tabla tr td:nth-child(2) {
    width: 40\%;
    text-align: center;
  }
  \#fecha-tabla tr td:nth-child(3) {
    width: 30\%;
    text-align: right;
  }
  @media (max-width: 768px) {
    \#fecha-tabla,
    \#fecha-tabla tr,
    \#fecha-tabla td {
      display: block;
      width: 100\% !important;
    }
    \#fecha-tabla tr {
      margin-bottom: 1em;
    }
    \#fecha-tabla td {
      text-align: left !important;
      padding: 0.3em 0;
    }
  }
}
