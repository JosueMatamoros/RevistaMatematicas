\Css{
li a {
  color: \#20948B;
  text-decoration: none;
  transition: color 0.2s;
}
li a:hover {
  color: \#14635f;
  text-decoration: underline;
}
}
% ventana independiente
\Css{
.btn-ventana {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: \#306898;
  border: 2px solid \#306898;
  padding: 8px 20px;
  font-size: 14px;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-weight: 600;
  border-radius: 30px;
  cursor: pointer;
  transition: background 0.22s, color 0.22s;
  margin-top: 8px;
}
.btn-ventana:hover {
  background: \#306898;
  color: white;
}
.btn-ventana:hover svg {
  stroke: white;
}
.btn-ventana svg {
  transition: stroke 0.22s, transform 0.2s;
  stroke: \#306898;
  fill: none;
}
.btn-ventana:hover svg {
  transform: translate(2px,-2px);
}
.iframe-container {
  text-align: center;
  margin: 1.2em 0;
  padding: 1em;
  border: 1px solid \#306898;
  background-color: \#f0f8ff;
  border-radius: 5px;
  display: inline-block;
}
.iframe-hint {
  font-size: 0.82em;
  color: \#306898;
  margin-top: 6px;
  display: block;
}
