<!DOCTYPE html><!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video: Determinantes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #1a4f8a;
            --gold: #c8922a;
            --bg: #fafafa;
            --text: #333;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 2rem;
            min-height: 100vh;
        }
        
        .page-header {
            max-width: 900px;
            margin: 0 auto 2rem;
            text-align: center;
        }
        
        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 2.5rem;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        
        .subtitle {
            font-size: 1rem;
            line-height: 1.6;
            color: #666;
        }
        
        .subtitle a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .subtitle a:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        
        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .video-header {
            background: linear-gradient(135deg, var(--accent) 0%, #2563a8 100%);
            color: white;
            padding: 1.5rem 2rem;
            font-family: 'DM Serif Display', serif;
            font-size: 1.8rem;
            text-align: center;
            border-bottom: 3px solid var(--gold);
        }
        
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            background: #000;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .video-info {
            padding: 1.5rem 2rem;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }
        
        .video-info p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            
            .page-header h1 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .video-header {
                font-size: 1.4rem;
                padding: 1rem 1.5rem;
            }
            
            .video-info {
                padding: 1rem 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.5rem;
            }
            
            .video-header {
                font-size: 1.2rem;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="page-header">
        <h1>Video: Determinantes</h1>
        <p class="subtitle">
            <a href="https://www.tec.ac.cr" target="_blank" rel="noopener">Instituto Tecnológico de Costa Rica</a>
            <br>
            <a href="https://tecdigital.tec.ac.cr/servicios/revistamatematica/" target="_blank" rel="noopener">Revista Matemática, Educación e Internet</a>
        </p>
    </header>
    
    <main>
        <div class="container">
            <div class="video-header">
                Video: Determinantes
            </div>
            <div class="video-wrapper">
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/yt3eoYvGel0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                    title="Video sobre Determinantes">
                </iframe>
            </div>
            <div class="video-info">
                <p>Este video presenta conceptos fundamentales sobre determinantes en el contexto del álgebra lineal.</p>
            </div>
        </div>
    </main>
</body>
</html>
